<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>K-STEP Cloud App</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
</head>
<body class="bg-slate-50 text-slate-900">
    <div id="root"></div>

    <script type="text/babel">
        // FirebaseモジュールをCDNから直接インポート
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.0.1/firebase-app.js";
        import { getAuth, signInAnonymously, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/11.0.1/firebase-auth.js";
        import { getFirestore, doc, setDoc, collection, onSnapshot } from "https://www.gstatic.com/firebasejs/11.0.1/firebase-firestore.js";

        // --- Firebase設定 ---
        const firebaseConfig = {
            apiKey: "AIzaSyAlHizRGdtO-DiqP72zfm8CfPN72lMF6uE",
            authDomain: "k-step-3918.firebaseapp.com",
            projectId: "k-step-3918",
            storageBucket: "k-step-3918.firebasestorage.app",
            messagingSenderId: "538203712492",
            appId: "1:538203712492:web:9f52d031d028852f432ec9"
        };

        const POWER_AUTOMATE_WEBHOOK_URL = ""; // あとでURLを入れる

        // 初期化
        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        const { useState, useEffect, useMemo } = React;

        function App() {
            const [user, setUser] = useState(null);
            const [records, setRecords] = useState([]);
            const [currentMonth, setCurrentMonth] = useState(() => {
                const now = new Date();
                return `${now.getFullYear()}-${String(now.getMonth() + 1).padStart(2, '0')}`;
            });
            const [status, setStatus] = useState("接続中...");

            useEffect(() => {
                signInAnonymously(auth).catch(err => setStatus("認証エラー: " + err.message));
                return onAuthStateChanged(auth, (u) => {
                    setUser(u);
                    if (u) setStatus("オンライン");
                });
            }, []);

            useEffect(() => {
                if (!user) return;
                const q = collection(db, "users", user.uid, "records");
                return onSnapshot(q, (snapshot) => {
                    const data = snapshot.docs.map(d => ({ ...d.data(), id: d.id }));
                    setRecords(data);
                }, (err) => setStatus("同期エラー: " + err.message));
            }, [user]);

            const toggleWarning = async (id, itemName) => {
                const record = records.find(r => r.id === id);
                if (!record) return;

                const newValue = !record.warningSigns?.[itemName];
                const updatedRecord = {
                    ...record,
                    warningSigns: { ...record.warningSigns, [itemName]: newValue }
                };

                try {
                    await setDoc(doc(db, "users", user.uid, "records", id), updatedRecord);
                    if (newValue && POWER_AUTOMATE_WEBHOOK_URL) {
                        fetch(POWER_AUTOMATE_WEBHOOK_URL, {
                            method: 'POST',
                            headers: { 'Content-Type': 'application/json' },
                            body: JSON.stringify({
                                userId: user.uid,
                                date: record.date,
                                time: record.time,
                                item: itemName
                            })
                        });
                    }
                } catch (e) {
                    alert("更新失敗: " + e.message);
                }
            };

            const addToday = async () => {
                const today = new Date().toISOString().split('T')[0];
                for (const t of ['朝', '昼', '晩']) {
                    const id = `${today}-${t}`;
                    await setDoc(doc(db, "users", user.uid, "records", id), {
                        id, date: today, time: t, warningSigns: {}, note: ''
                    });
                }
            };

            const filteredRecords = useMemo(() => {
                return records
                    .filter(r => r.date.startsWith(currentMonth))
                    .sort((a, b) => a.date.localeCompare(b.date) || (a.time === '朝' ? -1 : a.time === '晩' ? 1 : 0));
            }, [records, currentMonth]);

            if (!user) return <div className="p-10 text-center font-bold text-slate-500">{status}</div>;

            return (
                <div className="max-w-4xl mx-auto p-4">
                    <header className="flex justify-between items-center mb-6 bg-white p-4 rounded-xl shadow-sm border">
                        <h1 className="text-xl font-bold text-indigo-900">K-STEP Cloud</h1>
                        <div className="flex gap-2">
                            <input type="month" value={currentMonth} onChange={e => setCurrentMonth(e.target.value)} className="border rounded px-2 py-1 text-sm" />
                            <button onClick={addToday} className="bg-indigo-600 text-white px-4 py-1 rounded text-sm font-bold">追加</button>
                        </div>
                    </header>
                    <div className="bg-white rounded-xl shadow border overflow-hidden">
                        <table className="w-full text-left">
                            <thead className="bg-slate-900 text-white text-xs">
                                <tr>
                                    <th className="p-3">日付</th>
                                    <th className="p-3 text-center">眠気</th>
                                    <th className="p-3">状態</th>
                                </tr>
                            </thead>
                            <tbody>
                                {filteredRecords.map(r => (
                                    <tr key={r.id} className="border-b text-sm">
                                        <td className="p-3 font-bold">{r.date.slice(5)} ({r.time})</td>
                                        <td onClick={() => toggleWarning(r.id, '眠気')} className={`p-3 text-center cursor-pointer text-xl ${r.warningSigns?.['眠気'] ? 'text-amber-600' : 'text-slate-200'}`}>
                                            {r.warningSigns?.['眠気'] ? '●' : '○'}
                                        </td>
                                        <td className="p-3 text-xs text-slate-400">{r.warningSigns?.['眠気'] ? 'チェック済' : '-'}</td>
                                    </tr>
                                ))}
                            </tbody>
                        </table>
                    </div>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
