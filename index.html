<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>K-STEP Cloud App</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
</head>
<body class="bg-slate-50 text-slate-900">
    <div id="root"></div>

    <script type="text/babel">
        // Firebase SDKs
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.0.1/firebase-app.js";
        import { getAuth, signInAnonymously, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/11.0.1/firebase-auth.js";
        import { getFirestore, doc, setDoc, collection, onSnapshot } from "https://www.gstatic.com/firebasejs/11.0.1/firebase-firestore.js";

        // ==========================================
        // 1. Firebaseの設定（Firebaseコンソールから取得した内容に書き換えてください）
        // ==========================================
        const firebaseConfig = {
            apiKey: "AIzaSyAlHizRGdtO-DiqP72zfm8CfPN72lMF6uE",
       authDomain: "k-step-3918.firebaseapp.com",

    projectId: "k-step-3918",

    storageBucket: "k-step-3918.firebasestorage.app",

    messagingSenderId: "538203712492",

    appId: "1:538203712492:web:9f52d031d028852f432ec9",
        };

        // ==========================================
        // 2. Power Automate Webhook URL（取得したURLに書き換えてください）
        // ==========================================
        const POWER_AUTOMATE_WEBHOOK_URL = "YOUR_POWER_AUTOMATE_URL";

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        const { useState, useEffect, useMemo } = React;

        function App() {
            const [user, setUser] = useState(null);
            const [records, setRecords] = useState([]);
            const [currentMonth, setCurrentMonth] = useState(() => {
                const now = new Date();
                return `${now.getFullYear()}-${String(now.getMonth() + 1).padStart(2, '0')}`;
            });
            const [status, setStatus] = useState("接続中...");

            useEffect(() => {
                signInAnonymously(auth).catch(err => setStatus("認証エラー: " + err.message));
                return onAuthStateChanged(auth, (u) => {
                    setUser(u);
                    if (u) setStatus("オンライン");
                });
            }, []);

            useEffect(() => {
                if (!user) return;
                const q = collection(db, "users", user.uid, "records");
                return onSnapshot(q, (snapshot) => {
                    const data = snapshot.docs.map(d => ({ ...d.data(), id: d.id }));
                    setRecords(data);
                }, (err) => setStatus("同期エラー: " + err.message));
            }, [user]);

            const notifyPowerAutomate = async (record, itemName) => {
                if (!POWER_AUTOMATE_WEBHOOK_URL || POWER_AUTOMATE_WEBHOOK_URL.includes("YOUR_")) return;
                try {
                    await fetch(POWER_AUTOMATE_WEBHOOK_URL, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({
                            userId: user.uid,
                            date: record.date,
                            time: record.time,
                            item: itemName,
                            message: `${record.time}の記録で「${itemName}」にチェックが入りました。`
                        })
                    });
                } catch (e) {
                    console.error("Webhook送信失敗", e);
                }
            };

            const toggleWarning = async (id, itemName) => {
                const record = records.find(r => r.id === id);
                if (!record) return;

                const newValue = !record.warningSigns?.[itemName];
                const updatedRecord = {
                    ...record,
                    warningSigns: { ...record.warningSigns, [itemName]: newValue }
                };

                try {
                    await setDoc(doc(db, "users", user.uid, "records", id), updatedRecord);
                    if (newValue) notifyPowerAutomate(updatedRecord, itemName);
                } catch (e) {
                    alert("更新失敗: " + e.message);
                }
            };

            const addToday = async () => {
                const today = new Date().toISOString().split('T')[0];
                for (const t of ['朝', '昼', '晩']) {
                    const id = `${today}-${t}`;
                    await setDoc(doc(db, "users", user.uid, "records", id), {
                        id, date: today, time: t, warningSigns: {}, note: ''
                    });
                }
            };

            const filteredRecords = useMemo(() => {
                return records
                    .filter(r => r.date.startsWith(currentMonth))
                    .sort((a, b) => a.date.localeCompare(b.date) || (a.time === '朝' ? -1 : a.time === '晩' ? 1 : 0));
            }, [records, currentMonth]);

            if (!user) return <div className="p-10 text-center font-bold text-slate-500">{status}</div>;

            return (
                <div className="max-w-4xl mx-auto p-4 md:p-8">
                    <header className="flex justify-between items-center mb-8 bg-white p-6 rounded-2xl shadow-sm border border-slate-200">
                        <div>
                            <h1 className="text-2xl font-black text-indigo-900 tracking-tight">K-STEP Cloud</h1>
                            <p className="text-[10px] font-mono text-slate-400">UID: {user.uid}</p>
                        </div>
                        <div className="flex gap-3">
                            <input 
                                type="month" 
                                value={currentMonth} 
                                onChange={e => setCurrentMonth(e.target.value)}
                                className="border rounded-lg px-3 py-2 text-sm font-bold outline-none"
                            />
                            <button 
                                onClick={addToday}
                                className="bg-indigo-600 text-white px-5 py-2 rounded-lg font-bold text-sm hover:bg-indigo-700 transition-all"
                            >
                                今日を追加
                            </button>
                        </div>
                    </header>

                    <main className="bg-white rounded-2xl shadow-xl border border-slate-200 overflow-hidden">
                        <table className="w-full text-left border-collapse">
                            <thead>
                                <tr className="bg-slate-900 text-white text-[10px] uppercase tracking-widest font-bold">
                                    <th className="p-4 border-r border-slate-800">日付</th>
                                    <th className="p-4 text-center border-r border-slate-800 text-amber-400">眠気</th>
                                    <th className="p-4">ステータス</th>
                                </tr>
                            </thead>
                            <tbody className="text-sm">
                                {filteredRecords.map(r => (
                                    <tr key={r.id} className="border-b border-slate-100 hover:bg-slate-50 transition-colors">
                                        <td className="p-4 font-bold text-slate-600">
                                            {r.date.split('-').slice(1).join('/')} <span className="text-indigo-500 font-normal ml-1">({r.time})</span>
                                        </td>
                                        <td 
                                            onClick={() => toggleWarning(r.id, '眠気')}
                                            className={`p-4 text-center cursor-pointer text-2xl transition-all ${r.warningSigns?.['眠気'] ? 'bg-amber-50 text-amber-600' : 'text-slate-200'}`}
                                        >
                                            {r.warningSigns?.['眠気'] ? '●' : '○'}
                                        </td>
                                        <td className="p-4 text-slate-400 italic text-xs">
                                            {r.warningSigns?.['眠気'] ? '通知済み' : '未チェック'}
                                        </td>
                                    </tr>
                                ))}
                            </tbody>
                        </table>
                        {filteredRecords.length === 0 && (
                            <div className="p-16 text-center text-slate-400">データがありません。</div>
                        )}
                    </main>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
