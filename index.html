<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>K-STEP</title>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://www.gstatic.com/firebasejs/10.13.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.13.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.13.0/firebase-firestore-compat.js"></script>

    <style>
        .vertical-text { writing-mode: vertical-rl; height: 140px; font-weight: normal; font-size: 10px; }
        .table-container { height: calc(100vh - 180px); overflow: auto; }
        .sticky-col-1 { position: sticky; left: 0; z-index: 40; background: white; min-width: 100px; }
        .sticky-col-2 { position: sticky; left: 100px; z-index: 40; background: white; min-width: 50px; }
        thead th { position: sticky; top: 0; z-index: 50; }
        .header-row-1 th { top: 0; }
        .header-row-2 th { top: 33px; }
        tr:hover td { background-color: #f8fafc; }
        input[type="date"]::-webkit-inner-spin-button { display: none; }
        
        /* ロゴ用の微調整 */
        .logo-text {
            letter-spacing: -0.05em;
            font-family: 'Inter', system-ui, sans-serif;
        }
    </style>
</head>
<body class="bg-slate-50 text-slate-800">
    <div id="root"></div>

    <script type="text/babel">
        // --- 1. Firebase初期設定 ---
        const firebaseConfig = {
            apiKey: "AIzaSyAlHizRGdtO-DiqP72zfm8CfPN72lMF6uE",
            authDomain: "k-step-3918.firebaseapp.com",
            projectId: "k-step-3918",
            storageBucket: "k-step-3918.firebasestorage.app",
            messagingSenderId: "538203712492",
            appId: "1:538203712492:web:9f52d031d028852f432ec9"
        };

        if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        const db = firebase.firestore();
        const googleProvider = new firebase.auth.GoogleAuthProvider();

        const { useState, useEffect, useMemo } = React;

        const defaultSettings = {
            conditions: ['気分', '睡眠', '食事', 'ストレス'],
            goodSigns: ['まあいいか', '心に余裕がある', '適度な身だしなみ', '入浴が心地よい', '同じ時間に起きる', '適度な寝だめ'],
            warningSigns: ['満腹感がない', '過眠', '何も考えられない', '言葉数が少ない', 'やけ食い', '字が乱雑になる', '収納癖が出る'],
            badSigns: ['眠気を全く感じない', '物音に過敏', '家族を敵視', '散財・遠方へ行く', 'やることが多い', '脱着衣が激しい', '全能感'],
            recoveryItems: ['コーヒー', 'スキンケア', 'マインドフルネス']
        };

        // ==========================================
        // ★★ 2. Webhook送信関数 (LINE通知のコア) ★★
        // ==========================================
        const sendWebhook = async (user, item, category, date, time) => {
            // ↓↓↓ ★ここをPower AutomateのURLに書き換えてください★ ↓↓↓
            const WEBHOOK_URL = "https://script.google.com/macros/s/AKfycbxqy_CvzeXwsiIjAJf9N9Q4tFB9wK99HSFzDm-QX2_vHDwxRw4xT5Wh4p9HV3tmDVZarw/exec"; 
            
            if (!WEBHOOK_URL.startsWith("http")) return;

            try {
                await fetch(WEBHOOK_URL, {
                    method: 'POST',
                    mode: 'no-cors',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        user: user.email,
                        type: category === 'warningSigns' ? "注意サイン" : "悪化サイン",
                        detail: item,
                        date: date,
                        time: time
                    })
                });
                console.log("Webhook送信完了:", item);
            } catch (e) { console.error("Webhook送信エラー:", e); }
        };

        function App() {
            const [user, setUser] = useState(null);
            const [currentMonth, setCurrentMonth] = useState(() => {
                const now = new Date();
                return `${now.getFullYear()}-${String(now.getMonth() + 1).padStart(2, '0')}`;
            });
            const [allRecords, setAllRecords] = useState([]);
            const [settings, setSettings] = useState(defaultSettings);
            const [isConfigOpen, setIsConfigOpen] = useState(false);

            useEffect(() => {
                const unsubscribe = auth.onAuthStateChanged(u => setUser(u));
                return () => unsubscribe();
            }, []);

            useEffect(() => {
                if (!user) return;
                db.collection("users").doc(user.uid).collection("config").doc("settings").get().then(doc => {
                    if (doc.exists) setSettings(doc.data());
                });
                const unsubscribe = db.collection("users").doc(user.uid).collection("records").onSnapshot(snap => {
                    setAllRecords(snap.docs.map(d => ({ id: d.id, ...d.data() })));
                });
                return () => unsubscribe();
            }, [user]);

            const filteredRecords = useMemo(() => {
                return allRecords.filter(r => r.date?.startsWith(currentMonth)).sort((a,b) => {
                    if (a.date !== b.date) return a.date.localeCompare(b.date);
                    const order = { '朝': 1, '昼': 2, '晩': 3 };
                    return (order[a.time] || 0) - (order[b.time] || 0);
                });
            }, [allRecords, currentMonth]);

            const updateRecord = async (id, field, value, subField) => {
                const record = allRecords.find(r => r.id === id);
                let updated = { ...record };
                if (subField) updated[field] = { ...record[field], [subField]: value };
                else updated[field] = value;
                await db.collection("users").doc(user.uid).collection("records").doc(id).set(updated);
            };

            const toggleSign = async (id, category, item) => {
                const record = allRecords.find(r => r.id === id);
                const newValue = !record[category]?.[item];
                const updated = { ...record, [category]: { ...record[category], [item]: newValue } };
                
                await db.collection("users").doc(user.uid).collection("records").doc(id).set(updated);

                if (newValue && (category === 'warningSigns' || category === 'badSigns')) {
                    sendWebhook(user, item, category, record.date, record.time);
                }
            };

            const deleteRecord = async (id) => {
                if(confirm("この記録を削除しますか？")) {
                    await db.collection("users").doc(user.uid).collection("records").doc(id).delete();
                }
            };

            const addRecordGroup = () => {
                const today = new Date().toISOString().split('T')[0];
                ['朝', '昼', '晩'].forEach(t => {
                    const id = `${Date.now()}-${t}`;
                    db.collection("users").doc(user.uid).collection("records").doc(id).set({
                        date: today, time: t, conditions: {}, goodSigns: {}, warningSigns: {}, badSigns: {}, recovery: {}, note: ''
                    });
                });
            };

            const login = () => auth.signInWithPopup(googleProvider);
            const logout = () => { if(confirm("ログアウトしますか？")) auth.signOut(); };

            if (!user) {
                return (
                    <div className="flex flex-col items-center justify-center h-screen bg-slate-50">
                        <div className="flex flex-col items-center mb-8">
                            <span className="text-5xl font-black text-indigo-600 logo-text italic">K-STEP</span>
                            <div className="h-1 w-12 bg-indigo-600 rounded-full mt-1"></div>
                        </div>
                        <button onClick={login} className="bg-white border px-8 py-3 rounded-full font-bold shadow-sm hover:shadow-md flex items-center gap-3 transition-all border-slate-200">
                            <img src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/auth/google.svg" width="20" />
                            Googleでログイン
                        </button>
                    </div>
                );
            }

            return (
                <div className="flex flex-col h-screen overflow-hidden">
                    <header className="bg-white border-b p-4 flex justify-between items-center shrink-0 shadow-sm z-50">
                        <div className="flex items-center gap-6">
                            <div className="flex flex-col leading-none">
                                <h1 className="text-2xl font-black text-indigo-600 logo-text italic tracking-tighter">K-STEP</h1>
                                <span className="text-[8px] font-bold text-slate-400 tracking-widest ml-0.5">SELF-CARE</span>
                            </div>
                            <div className="flex items-center gap-2 bg-slate-50 p-1 rounded-lg border border-slate-100">
                                <input type="month" value={currentMonth} onChange={e => setCurrentMonth(e.target.value)} className="bg-transparent px-2 font-bold text-sm outline-none text-slate-600" />
                            </div>
                        </div>
                        <div className="flex items-center gap-4">
                            <button onClick={() => setIsConfigOpen(true)} className="text-slate-400 hover:text-slate-600 font-bold px-2 text-sm transition-colors">⚙ 設定</button>
                            <button onClick={addRecordGroup} className="bg-indigo-600 text-white px-4 py-2 rounded-lg text-sm font-bold shadow-lg shadow-indigo-100 active:scale-95 transition-all hover:bg-indigo-700">＋ 今日を追加</button>
                            <button onClick={logout} className="text-[10px] text-red-400 hover:text-red-500 underline ml-2">Logout</button>
                        </div>
                    </header>

                    <div className="flex-grow table-container p-4">
                        <div className="bg-white rounded-xl shadow-sm border border-slate-200 overflow-hidden">
                            <table className="border-collapse text-[11px] w-max">
                                <thead>
                                    <tr className="bg-slate-800 text-white header-row-1">
                                        <th className="sticky-col-1 bg-slate-800 p-2 border border-slate-700" rowSpan="2">日付</th>
                                        <th className="sticky-col-2 bg-slate-800 p-2 border border-slate-700" rowSpan="2">時間</th>
                                        <th className="p-1 border border-slate-700 text-center" colSpan={settings.conditions.length}>状態(1-5)</th>
                                        <th className="p-1 border border-slate-700 bg-blue-900/50" colSpan={settings.goodSigns.length}>良好</th>
                                        <th className="p-1 border border-slate-700 bg-amber-900/50" colSpan={settings.warningSigns.length}>注意</th>
                                        <th className="p-1 border border-slate-700 bg-red-900/50" colSpan={settings.badSigns.length}>悪化</th>
                                        <th className="p-1 border border-slate-700 bg-emerald-900/50" colSpan={settings.recoveryItems.length}>リカバリ</th>
                                        <th className="p-2 border border-slate-700 min-w-[150px]" rowSpan="2">備考</th>
                                        <th className="p-2 border border-slate-700" rowSpan="2"></th>
                                    </tr>
                                    <tr className="bg-slate-100 text-slate-600 header-row-2">
                                        {settings.conditions.map(h => <th key={h} className="vertical-text p-1 border border-slate-300">{h}</th>)}
                                        {settings.goodSigns.map(h => <th key={h} className="vertical-text p-1 border border-slate-300 text-blue-600">{h}</th>)}
                                        {settings.warningSigns.map(h => <th key={h} className="vertical-text p-1 border border-slate-300 text-amber-600">{h}</th>)}
                                        {settings.badSigns.map(h => <th key={h} className="vertical-text p-1 border border-slate-300 text-red-600">{h}</th>)}
                                        {settings.recoveryItems.map(h => <th key={h} className="vertical-text p-1 border border-slate-300 text-emerald-600">{h}</th>)}
                                    </tr>
                                </thead>
                                <tbody>
                                    {filteredRecords.map(r => (
                                        <tr key={r.id} className="border-b border-slate-100">
                                            <td className="sticky-col-1 p-1 border border-slate-100 bg-white">
                                                <input type="date" value={r.date} onChange={e => updateRecord(r.id, 'date', e.target.value)} className="w-full outline-none bg-transparent" />
                                            </td>
                                            <td className="sticky-col-2 p-1 border border-slate-100 text-center font-bold bg-white">{r.time}</td>
                                            {settings.conditions.map(h => (
                                                <td key={h} className="border border-slate-100 text-center p-0">
                                                    <select value={r.conditions?.[h] || ''} onChange={e => updateRecord(r.id, 'conditions', e.target.value, h)} className="w-full h-8 text-center outline-none bg-transparent font-bold appearance-none">
                                                        <option value="">-</option>{[1,2,3,4,5].map(v => <option key={v} value={v}>{v}</option>)}
                                                    </select>
                                                </td>
                                            ))}
                                            {settings.goodSigns.map(h => <td key={h} onClick={() => toggleSign(r.id, 'goodSigns', h)} className={`border border-slate-100 text-center cursor-pointer transition-colors ${r.goodSigns?.[h] ? 'bg-blue-50 text-blue-600 font-bold' : ''}`}>{r.goodSigns?.[h] ? '○' : ''}</td>)}
                                            {settings.warningSigns.map(h => <td key={h} onClick={() => toggleSign(r.id, 'warningSigns', h)} className={`border border-slate-100 text-center cursor-pointer transition-colors ${r.warningSigns?.[h] ? 'bg-amber-50 text-amber-600 font-bold' : ''}`}>{r.warningSigns?.[h] ? '○' : ''}</td>)}
                                            {settings.badSigns.map(h => <td key={h} onClick={() => toggleSign(r.id, 'badSigns', h)} className={`border border-slate-100 text-center cursor-pointer transition-colors ${r.badSigns?.[h] ? 'bg-red-50 text-red-600 font-bold' : ''}`}>{r.badSigns?.[h] ? '○' : ''}</td>)}
                                            {settings.recoveryItems.map(h => <td key={h} onClick={() => toggleSign(r.id, 'recovery', h)} className={`border border-slate-100 text-center cursor-pointer transition-colors ${r.recovery?.[h] ? 'bg-emerald-50 text-emerald-600 font-bold' : ''}`}>{r.recovery?.[h] ? '○' : ''}</td>)}
                                            <td className="p-1 border border-slate-100">
                                                <input type="text" value={r.note || ''} onChange={e => updateRecord(r.id, 'note', e.target.value)} className="w-full outline-none bg-transparent" placeholder="..." />
                                            </td>
                                            <td className="p-1 border border-slate-100 text-center">
                                                <button onClick={() => deleteRecord(r.id)} className="text-slate-200 hover:text-red-400 transition-colors">✕</button>
                                            </td>
                                        </tr>
                                    ))}
                                </tbody>
                            </table>
                        </div>
                    </div>

                    {isConfigOpen && (
                        <div className="fixed inset-0 bg-slate-900/60 backdrop-blur-sm z-[100] flex items-center justify-center p-4">
                            <div className="bg-white rounded-2xl w-full max-w-4xl max-h-[90vh] overflow-hidden flex flex-col shadow-2xl border border-slate-200">
                                <div className="p-6 border-b flex justify-between items-center bg-slate-50">
                                    <h2 className="text-xl font-bold text-slate-700">項目設定</h2>
                                    <button onClick={() => setIsConfigOpen(false)} className="text-2xl text-slate-400 hover:text-slate-600">×</button>
                                </div>
                                <div className="p-6 overflow-y-auto space-y-6">
                                    {Object.entries({ conditions: '状態', goodSigns: '良好', warningSigns: '注意', badSigns: '悪化', recoveryItems: 'リカバリ' }).map(([key, label]) => (
                                        <div key={key}>
                                            <h3 className="font-bold mb-2 text-indigo-700 text-sm tracking-widest">{label}</h3>
                                            <div className="grid grid-cols-2 md:grid-cols-4 gap-2">
                                                {settings[key].map((item, idx) => (
                                                    <div key={idx} className="flex gap-1 items-center bg-slate-50 p-1.5 rounded-lg border border-slate-200 shadow-sm">
                                                        <input type="text" value={item} onChange={e => {
                                                            const newItems = [...settings[key]];
                                                            newItems[idx] = e.target.value;
                                                            setSettings({...settings, [key]: newItems});
                                                            db.collection("users").doc(user.uid).collection("config").doc("settings").set({...settings, [key]: newItems});
                                                        }} className="flex-grow text-xs bg-transparent outline-none text-slate-600 font-medium" />
                                                    </div>
                                                ))}
                                            </div>
                                        </div>
                                    ))}
                                </div>
                                <div className="p-4 border-t text-right bg-slate-50">
                                    <button onClick={() => setIsConfigOpen(false)} className="bg-indigo-600 text-white px-8 py-2 rounded-lg font-bold shadow-md hover:bg-indigo-700 transition-all">保存して閉じる</button>
                                </div>
                            </div>
                        </div>
                    )}
                </div>
            );
        }
        ReactDOM.createRoot(document.getElementById('root')).render(<App />);
    </script>
</body>
</html>
