<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>K-STEP 体調管理シート</title>
    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        /* 縦書き設定と固定ヘッダー */
        .vertical-text { writing-mode: vertical-rl; height: 140px; font-weight: normal; }
        .no-vertical { writing-mode: horizontal-tb; height: auto; }
        
        thead tr:nth-child(1) th { position: sticky; top: 0; z-index: 50; }
        thead tr:nth-child(2) th { position: sticky; top: 40px; z-index: 50; }
        
        .sticky-col-1 { position: sticky; left: 0; z-index: 40; background: white; }
        .sticky-col-2 { position: sticky; left: 100px; z-index: 40; background: white; }
        
        .table-container { height: calc(100vh - 160px); overflow: auto; }
        
        /* カスタムスクロールバー */
        ::-webkit-scrollbar { width: 8px; height: 8px; }
        ::-webkit-scrollbar-track { background: #f1f1f1; }
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: #94a3b8; }
    </script>
</head>
<body class="bg-slate-100 text-slate-800">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useMemo } = React;

        // デフォルトの項目設定
        const defaultSettings = {
            conditions: ['気分', '睡眠', '食事', 'ストレス'],
            goodSigns: ['まあいいか', '心に余裕がある', '適度な身だしなみ', '入浴が心地よい', '同じ時間に起きる', '適度な寝だめ'],
            warningSigns: ['満腹感がない', '過眠', '何も考えられない', '言葉数が少ない', 'やけ食い', '字が乱雑になる', '収納癖が出る'],
            badSigns: ['眠気を全く感じない', '物音に過敏', '家族を敵視', '散財・遠方へ行く', 'やることが多い', '脱着衣が激しい', '全能感'],
            recoveryItems: ['コーヒー', 'スキンケア', 'マインドフルネス']
        };

        function App() {
            // 状態管理
            const [currentMonth, setCurrentMonth] = useState(() => {
                const now = new Date();
                return `${now.getFullYear()}-${String(now.getMonth() + 1).padStart(2, '0')}`;
            });

            const [allRecords, setAllRecords] = useState(() => {
                const saved = localStorage.getItem('kstep_all_data');
                return saved ? JSON.parse(saved) : [];
            });

            const [settings, setSettings] = useState(() => {
                const saved = localStorage.getItem('kstep_settings');
                return saved ? JSON.parse(saved) : defaultSettings;
            });

            const [isConfigOpen, setIsConfigOpen] = useState(false);

            // 保存処理
            useEffect(() => {
                localStorage.setItem('kstep_all_data', JSON.stringify(allRecords));
            }, [allRecords]);

            useEffect(() => {
                localStorage.setItem('kstep_settings', JSON.stringify(settings));
            }, [settings]);

            // フィルタリングとソート
            const filteredRecords = useMemo(() => {
                return allRecords
                    .filter(r => r.date.startsWith(currentMonth))
                    .sort((a, b) => {
                        if (a.date !== b.date) return a.date.localeCompare(b.date);
                        const timeOrder = { '朝': 1, '昼': 2, '晩': 3 };
                        return timeOrder[a.time] - timeOrder[b.time];
                    });
            }, [allRecords, currentMonth]);

            // 操作関数
            const addRecord = () => {
                const today = new Date();
                const defaultDate = today.toISOString().startsWith(currentMonth) 
                    ? today.toISOString().split('T')[0] 
                    : `${currentMonth}-01`;
                const newRecord = {
                    id: Date.now(),
                    date: defaultDate,
                    time: '朝',
                    conditions: {},
                    goodSigns: {},
                    warningSigns: {},
                    badSigns: {},
                    recovery: {},
                    medication: false,
                    note: ''
                };
                setAllRecords([...allRecords, newRecord]);
            };

            const updateRecord = (id, field, value, subField) => {
                setAllRecords(prev => prev.map(r => r.id === id ? (subField ? { ...r, [field]: { ...r[field], [subField]: value } } : { ...r, [field]: value }) : r));
            };

            const toggleSign = (id, category, item) => {
                setAllRecords(prev => prev.map(r => r.id === id ? { ...r, [category]: { ...r[category], [item]: !r[category][item] } } : r));
            };

            // 設定編集用のヘルパー
            const updateSettingItem = (category, index, value) => {
                const newItems = [...settings[category]];
                if (value === null) {
                    newItems.splice(index, 1);
                } else {
                    newItems[index] = value;
                }
                setSettings({ ...settings, [category]: newItems });
            };

            const addSettingItem = (category) => {
                setSettings({ ...settings, [category]: [...settings[category], '新項目'] });
            };

            return (
                <div className="p-2 md:p-4 max-w-[1600px] mx-auto min-h-screen">
                    {/* ヘッダー */}
                    <div className="bg-white p-4 rounded-xl shadow-sm mb-4 flex flex-wrap items-center justify-between gap-4 sticky top-0 z-[60]">
                        <div className="flex items-center gap-4">
                            <h1 className="text-xl font-bold text-indigo-900">K-STEP 体調管理</h1>
                            <div className="flex items-center gap-2 bg-slate-100 p-1 rounded-lg border border-slate-200">
                                <input type="month" value={currentMonth} onChange={(e) => setCurrentMonth(e.target.value)} className="bg-transparent border-none outline-none text-sm font-bold p-1 cursor-pointer" />
                            </div>
                        </div>
                        <div className="flex gap-2">
                            <button onClick={() => setIsConfigOpen(true)} className="bg-slate-200 text-slate-700 px-4 py-2 rounded-lg text-sm font-bold hover:bg-slate-300 transition-all">⚙ 項目設定</button>
                            <button onClick={addRecord} className="bg-indigo-600 text-white px-4 py-2 rounded-lg text-sm font-bold hover:bg-indigo-700 shadow-md active:scale-95 transition-all">＋ 記録追加</button>
                        </div>
                    </div>

                    {/* メインテーブル */}
                    <div className="table-container bg-white rounded-xl shadow-lg border border-slate-200">
                        <table className="w-max border-collapse">
                            <thead>
                                <tr className="bg-slate-800 text-white text-[10px]">
                                    <th className="no-vertical p-2 border border-slate-700 sticky-col-1 bg-slate-800" rowSpan="2">日付</th>
                                    <th className="no-vertical p-2 border border-slate-700 sticky-col-2 bg-slate-800 w-16" rowSpan="2">時間</th>
                                    <th className="no-vertical border border-slate-700 p-1 h-auto" colSpan={settings.conditions.length}>状態(1-5)</th>
                                    <th className="no-vertical border border-slate-700 p-1 bg-blue-900/40 h-auto" colSpan={settings.goodSigns.length}>良好サイン</th>
                                    <th className="no-vertical border border-slate-700 p-1 bg-amber-900/40 h-auto" colSpan={settings.warningSigns.length}>注意サイン</th>
                                    <th className="no-vertical border border-slate-700 p-1 bg-red-900/40 h-auto" colSpan={settings.badSigns.length}>悪化サイン</th>
                                    <th className="no-vertical border border-slate-700 p-1 bg-emerald-900/40 h-auto" colSpan={settings.recoveryItems.length}>リカバリー</th>
                                    <th className="no-vertical p-2 border border-slate-700 w-12" rowSpan="2">頓服</th>
                                    <th className="no-vertical p-2 border border-slate-700 min-w-[200px]" rowSpan="2">備考</th>
                                    <th className="no-vertical border border-slate-700 w-10" rowSpan="2"></th>
                                </tr>
                                <tr className="bg-slate-100 text-slate-600 text-[10px]">
                                    {settings.conditions.map(h => <th key={h} className="vertical-text border border-slate-200 p-1">{h}</th>)}
                                    {settings.goodSigns.map(h => <th key={h} className="vertical-text border border-slate-200 p-1 text-blue-700">{h}</th>)}
                                    {settings.warningSigns.map(h => <th key={h} className="vertical-text border border-slate-200 p-1 text-amber-700">{h}</th>)}
                                    {settings.badSigns.map(h => <th key={h} className="vertical-text border border-slate-200 p-1 text-red-700">{h}</th>)}
                                    {settings.recoveryItems.map(h => <th key={h} className="vertical-text border border-slate-200 p-1 text-emerald-700">{h}</th>)}
                                </tr>
                            </thead>
                            <tbody>
                                {filteredRecords.map(r => (
                                    <tr key={r.id} className="hover:bg-indigo-50/50 border-b border-slate-100 transition-colors group">
                                        <td className="p-1 border border-slate-200 sticky-col-1 group-hover:bg-indigo-50"><input type="date" value={r.date} onChange={(e) => updateRecord(r.id, 'date', e.target.value)} className="w-full text-xs font-medium outline-none bg-transparent" /></td>
                                        <td className="p-1 border border-slate-200 sticky-col-2 group-hover:bg-indigo-50">
                                            <select value={r.time} onChange={(e) => updateRecord(r.id, 'time', e.target.value)} className="w-full text-xs font-bold outline-none bg-transparent text-center cursor-pointer appearance-none">
                                                <option>朝</option><option>昼</option><option>晩</option>
                                            </select>
                                        </td>
                                        {settings.conditions.map(h => (
                                            <td key={h} className="border border-slate-200 p-0 text-center">
                                                <select value={r.conditions[h] || ''} onChange={(e) => updateRecord(r.id, 'conditions', e.target.value, h)} className="w-full p-2 outline-none bg-transparent text-center font-bold text-slate-600 appearance-none">
                                                    <option value="">-</option>{[1,2,3,4,5].map(v => <option key={v} value={v}>{v}</option>)}
                                                </select>
                                            </td>
                                        ))}
                                        {settings.goodSigns.map(h => <td key={h} onClick={() => toggleSign(r.id, 'goodSigns', h)} className={`border border-slate-200 text-center cursor-pointer transition-all ${r.goodSigns[h] ? 'bg-blue-100 text-blue-700' : ''}`}>{r.goodSigns[h] ? '○' : ''}</td>)}
                                        {settings.warningSigns.map(h => <td key={h} onClick={() => toggleSign(r.id, 'warningSigns', h)} className={`border border-slate-200 text-center cursor-pointer transition-all ${r.warningSigns[h] ? 'bg-amber-100 text-amber-700' : ''}`}>{r.warningSigns[h] ? '○' : ''}</td>)}
                                        {settings.badSigns.map(h => <td key={h} onClick={() => toggleSign(r.id, 'badSigns', h)} className={`border border-slate-200 text-center cursor-pointer transition-all ${r.badSigns[h] ? 'bg-red-100 text-red-700' : ''}`}>{r.badSigns[h] ? '○' : ''}</td>)}
                                        {settings.recoveryItems.map(h => <td key={h} onClick={() => toggleSign(r.id, 'recovery', h)} className={`border border-slate-200 text-center cursor-pointer transition-all ${r.recovery[h] ? 'bg-emerald-100 text-emerald-700' : ''}`}>{r.recovery[h] ? '○' : ''}</td>)}
                                        <td onClick={() => updateRecord(r.id, 'medication', !r.medication)} className={`border border-slate-200 text-center cursor-pointer ${r.medication ? 'bg-purple-100 text-purple-700' : ''}`}>{r.medication ? '○' : ''}</td>
                                        <td className="p-1 border border-slate-200"><input type="text" value={r.note || ''} onChange={(e) => updateRecord(r.id, 'note', e.target.value)} className="w-full text-[10px] outline-none bg-transparent" placeholder="メモ..." /></td>
                                        <td className="border border-slate-200 text-center"><button onClick={() => setAllRecords(allRecords.filter(x => x.id !== r.id))} className="text-slate-300 hover:text-red-500 p-1 text-xs">✕</button></td>
                                    </tr>
                                ))}
                            </tbody>
                        </table>
                    </div>

                    {/* 設定モーダル */}
                    {isConfigOpen && (
                        <div className="fixed inset-0 bg-black/50 backdrop-blur-sm z-[100] flex items-center justify-center p-4">
                            <div className="bg-white rounded-2xl w-full max-w-4xl max-h-[90vh] overflow-hidden flex flex-col shadow-2xl">
                                <div className="p-6 border-b flex justify-between items-center bg-slate-50">
                                    <h2 className="text-xl font-bold">項目設定のカスタマイズ</h2>
                                    <button onClick={() => setIsConfigOpen(false)} className="text-slate-400 hover:text-slate-600 text-2xl">✕</button>
                                </div>
                                <div className="p-6 overflow-y-auto space-y-8">
                                    {Object.entries({
                                        conditions: '基本状態 (1-5段階評価)',
                                        goodSigns: '良好サイン (青色表示)',
                                        warningSigns: '注意サイン (黄色表示)',
                                        badSigns: '悪化サイン (赤色表示)',
                                        recoveryItems: 'リカバリー項目 (緑色表示)'
                                    }).map(([key, label]) => (
                                        <div key={key}>
                                            <h3 className="font-bold mb-3 text-slate-700 flex items-center gap-2">
                                                <span className="w-1.5 h-6 bg-indigo-500 rounded-full"></span>
                                                {label}
                                            </h3>
                                            <div className="grid grid-cols-2 md:grid-cols-3 gap-2">
                                                {settings[key].map((item, idx) => (
                                                    <div key={idx} className="flex gap-1">
                                                        <input 
                                                            type="text" 
                                                            value={item} 
                                                            onChange={(e) => updateSettingItem(key, idx, e.target.value)}
                                                            className="flex-grow p-2 bg-slate-50 border rounded-lg text-sm outline-none focus:border-indigo-500"
                                                        />
                                                        <button onClick={() => updateSettingItem(key, idx, null)} className="text-slate-300 hover:text-red-500 px-1">✕</button>
                                                    </div>
                                                ))}
                                                <button onClick={() => addSettingItem(key)} className="border-2 border-dashed border-slate-200 text-slate-400 p-2 rounded-lg text-sm hover:bg-slate-50">＋ 追加</button>
                                            </div>
                                        </div>
                                    ))}
                                </div>
                                <div className="p-6 border-t bg-slate-50 text-right">
                                    <button onClick={() => setIsConfigOpen(false)} className="bg-indigo-600 text-white px-8 py-3 rounded-xl font-bold shadow-lg shadow-indigo-200 active:scale-95 transition-all">設定を反映して閉じる</button>
                                </div>
                            </div>
                        </div>
                    )}
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
